title: Driver File Created in Temp Directory
id: b2c3d4e5-f6a7-4b5b-8c9d-0e1f2a3b4c5d
status: experimental
description: Detects the creation of .sys files in temporary or user-writable directories.
author: OpenCLAW / Abacus.AI
logsource:
    product: windows
    category: file_event
detection:
    selection:
        TargetFilename|endswith: '.sys'
        TargetFilename|contains:
            - '\AppData\Local\Temp'
            - '\Users\Public'
            - '\Windows\Temp'
    condition: selection
level: high
tags:
    - attack.defense_evasion
    - attack.t1068
